<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sevgilim Olur musun?</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&family=Dancing+Script:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--rose:#e8334a;--deep:#c0143c;--blush:#ffd6de;--muted:rgba(255,200,200,.6);--bg1:#1a0010;--bg2:#3d0020;--bg3:#120008;--bg4:#2d0018;}
body{min-height:100vh;background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 50%,var(--bg1) 100%);font-family:'Lato',sans-serif;overflow-x:hidden;position:relative;}
#starCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
#musicBtn{position:fixed;top:18px;right:18px;z-index:999;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,150,150,.3);color:#ffd6de;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;backdrop-filter:blur(8px);}
#musicBtn:hover{background:rgba(255,80,100,.2);}
#musicBtn.playing{animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(220,50,80,.4);}50%{box-shadow:0 0 0 10px rgba(220,50,80,0);}}
.screen{min-height:100vh;width:100%;display:none;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:10;padding:40px 20px;}
.screen.active{display:flex;}
#askScreen .card{background:rgba(255,255,255,.04);border:1px solid rgba(255,150,150,.2);border-radius:28px;padding:48px 44px;text-align:center;max-width:460px;width:100%;backdrop-filter:blur(16px);box-shadow:0 0 80px rgba(220,50,80,.12),inset 0 0 40px rgba(255,80,100,.03);animation:cardIn .9s cubic-bezier(.22,1,.36,1) both;}
@keyframes cardIn{from{opacity:0;transform:translateY(40px) scale(.94);}to{opacity:1;transform:translateY(0) scale(1);}}
.big-heart{font-size:60px;display:block;margin-bottom:12px;animation:hb 1.5s ease-in-out infinite;}
@keyframes hb{0%,100%{transform:scale(1);}14%{transform:scale(1.18);}28%{transform:scale(1);}42%{transform:scale(1.1);}56%{transform:scale(1);}}
.name-label{font-size:11px;color:rgba(255,200,200,.5);letter-spacing:5px;text-transform:uppercase;margin-bottom:6px;}
.name-display{font-family:'Dancing Script',cursive;font-size:52px;font-weight:700;color:var(--blush);margin-bottom:8px;text-shadow:0 0 40px rgba(255,150,170,.6);animation:nameGlow 3s ease-in-out infinite alternate;}
@keyframes nameGlow{from{text-shadow:0 0 20px rgba(255,150,170,.4);}to{text-shadow:0 0 50px rgba(255,150,170,.9),0 0 80px rgba(220,50,80,.3);}}
.typewriter{font-family:'Playfair Display',serif;font-size:17px;color:#fff0f3;line-height:1.7;margin-bottom:32px;min-height:60px;text-shadow:0 2px 12px rgba(220,50,80,.2);}
.cursor{display:inline-block;width:2px;height:1.1em;background:#ffb3c0;margin-left:2px;vertical-align:text-bottom;animation:blink .8s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
.btn-yes{background:linear-gradient(135deg,var(--rose),var(--deep));border:none;border-radius:50px;color:#fff;font-family:'Lato',sans-serif;font-size:16px;letter-spacing:1.5px;padding:15px 44px;cursor:pointer;box-shadow:0 4px 24px rgba(220,50,80,.55),0 0 50px rgba(220,50,80,.15);transition:transform .15s,box-shadow .15s;margin-bottom:12px;}
.btn-yes:hover{transform:scale(1.08);box-shadow:0 6px 32px rgba(220,50,80,.75);}
.btn-yes:active{transform:scale(.97);}
.btn-no{background:rgba(255,255,255,.06);border:1px solid rgba(255,150,150,.2);border-radius:50px;color:rgba(255,200,210,.6);font-family:'Lato',sans-serif;font-size:13px;letter-spacing:1px;padding:12px 28px;cursor:pointer;position:fixed;}
#successScreen{gap:0;}
#successScreen .inner{text-align:center;max-width:500px;width:100%;}
.success-heart{font-size:90px;display:block;animation:hb 1.3s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(255,80,100,.8));margin-bottom:8px;}
.success-title{font-family:'Dancing Script',cursive;font-size:58px;font-weight:700;color:var(--blush);text-shadow:0 0 40px rgba(255,150,170,.7);margin-bottom:6px;}
.counter-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,150,150,.15);border-radius:20px;padding:20px 28px;margin:20px auto;display:inline-flex;gap:20px;align-items:center;backdrop-filter:blur(8px);}
.counter-box{text-align:center;}
.counter-num{font-family:'Playfair Display',serif;font-size:42px;font-weight:600;color:var(--blush);line-height:1;text-shadow:0 0 20px rgba(255,150,170,.5);animation:countIn .6s cubic-bezier(.22,1,.36,1) both;}
@keyframes countIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.counter-label{font-size:10px;color:rgba(255,200,200,.4);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.counter-sep{font-size:28px;color:rgba(255,150,150,.3);padding-bottom:14px;}
.success-sub{font-size:14px;color:rgba(255,200,200,.55);line-height:1.9;letter-spacing:.5px;margin:8px 0 20px;}
.btn-gallery{background:linear-gradient(135deg,var(--rose),var(--deep));border:none;border-radius:50px;color:#fff;font-family:'Lato',sans-serif;font-size:14px;letter-spacing:2px;padding:14px 36px;cursor:pointer;box-shadow:0 4px 20px rgba(220,50,80,.5);transition:transform .2s;margin:4px;}
.btn-gallery:hover{transform:scale(1.06);}
.btn-poem{background:rgba(255,255,255,.06);border:1px solid rgba(255,150,150,.2);border-radius:50px;color:rgba(255,200,210,.7);font-family:'Lato',sans-serif;font-size:13px;letter-spacing:1px;padding:12px 28px;cursor:pointer;transition:all .2s;margin:4px;}
.btn-poem:hover{background:rgba(255,80,100,.1);color:var(--blush);}
#galleryScreen{background:linear-gradient(160deg,var(--bg3) 0%,var(--bg4) 50%,var(--bg3) 100%);}
.gallery-title{font-family:'Dancing Script',cursive;font-size:38px;font-weight:700;color:var(--blush);margin-bottom:2px;text-shadow:0 0 30px rgba(255,150,170,.5);}
.gallery-sub{font-size:11px;color:rgba(255,200,200,.35);letter-spacing:4px;text-transform:uppercase;margin-bottom:32px;}
.polaroid-wrap{width:100%;overflow:hidden;position:relative;padding:30px 0 50px;}
.polaroid-wrap::before,.polaroid-wrap::after{content:'';position:absolute;top:0;bottom:0;width:70px;z-index:10;pointer-events:none;}
.polaroid-wrap::before{left:0;background:linear-gradient(to right,var(--bg3),transparent);}
.polaroid-wrap::after{right:0;background:linear-gradient(to left,var(--bg3),transparent);}
.polaroid-track{display:flex;gap:24px;padding:20px 80px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none;cursor:grab;user-select:none;}
.polaroid-track::-webkit-scrollbar{display:none;}
.polaroid-track.grabbing{cursor:grabbing;}
.polaroid{flex-shrink:0;background:#fffef9;padding:10px 10px 40px;border-radius:2px;scroll-snap-align:center;transform:rotate(var(--rot)) scale(.9);opacity:0;animation:polaroidIn .8s cubic-bezier(.22,1,.36,1) forwards;animation-delay:var(--delay);box-shadow:0 8px 30px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.3);position:relative;overflow:hidden;transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s;width:190px;}
.polaroid:hover{transform:rotate(0deg) scale(1.08) translateY(-10px) !important;box-shadow:0 22px 55px rgba(220,50,80,.45),0 4px 14px rgba(0,0,0,.4);z-index:20;}
@keyframes polaroidIn{0%{opacity:0;transform:rotate(calc(var(--rot)*2)) scale(.5) translateY(80px);}100%{opacity:1;transform:rotate(var(--rot)) scale(.9);}}
.polaroid img{width:100%;height:175px;object-fit:cover;display:block;}
.polaroid-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 45%,rgba(255,255,255,.06) 100%);pointer-events:none;}
.gallery-controls{display:flex;gap:24px;margin-top:4px;align-items:center;}
.ctrl-btn{background:none;border:1px solid rgba(255,150,150,.25);border-radius:50%;width:44px;height:44px;color:rgba(255,200,200,.7);font-size:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.ctrl-btn:hover{background:rgba(255,80,100,.15);border-color:rgba(255,150,150,.5);color:var(--blush);}
.btn-back{background:none;border:none;color:rgba(255,200,200,.35);font-size:11px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;margin-top:18px;transition:color .2s;}
.btn-back:hover{color:rgba(255,200,200,.8);}
#poemScreen{background:linear-gradient(160deg,var(--bg3),var(--bg4),var(--bg3));}
.poem-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,150,150,.15);border-radius:28px;padding:44px 40px;max-width:460px;width:100%;backdrop-filter:blur(12px);text-align:center;animation:cardIn .7s cubic-bezier(.22,1,.36,1) both;}
.poem-author{font-size:10px;color:rgba(255,200,200,.35);letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;}
.poem-title{font-family:'Dancing Script',cursive;font-size:32px;font-weight:700;color:var(--blush);margin-bottom:24px;text-shadow:0 0 30px rgba(255,150,170,.5);}
.poem-body{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:rgba(255,230,235,.8);line-height:2.1;text-align:center;}
.poem-body .stanza{margin-bottom:22px;}
.poem-body .stanza:last-child{margin-bottom:0;}
.poem-line{display:block;opacity:0;transform:translateY(10px);animation:lineIn .5s ease forwards;}
@keyframes lineIn{to{opacity:1;transform:translateY(0);}}
.confetti-hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;}
.conf-heart{position:absolute;top:-40px;animation:confFall linear forwards;}
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div class="confetti-hearts" id="confetti"></div>
<button id="musicBtn" onclick="toggleMusic()">&#9835;</button>
<div id="ytContainer" style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;">
  <div id="ytPlayer"></div>
</div>

<!-- EKRAN 1: SORU -->
<div class="screen active" id="askScreen">
  <div class="card">
    <span class="big-heart">&#129728;</span>
    <div class="name-label">Bir Sorum Var</div>
    <div class="name-display">Y&#252;sra</div>
    <div class="typewriter" id="typewriter"><span class="cursor"></span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
      <button class="btn-yes" onclick="sayYes()">&#9825; Evet</button>
      <button class="btn-no" id="noBtn" onmouseover="runAway()">Hay&#305;r</button>
    </div>
  </div>
</div>

<!-- EKRAN 2: EVET -->
<div class="screen" id="successScreen">
  <div class="inner">
    <span class="success-heart">&#10084;&#65039;</span>
    <div class="success-title">Y&#252;sra &#10084;&#65039;</div>
    <div class="counter-wrap">
      <div class="counter-box"><div class="counter-num" id="cDays">0</div><div class="counter-label">G&#252;n</div></div>
      <div class="counter-sep">&#10084;</div>
      <div class="counter-box"><div class="counter-num" id="cHours">0</div><div class="counter-label">Saat</div></div>
      <div class="counter-sep">&#10084;</div>
      <div class="counter-box"><div class="counter-num" id="cMins">0</div><div class="counter-label">Dakika</div></div>
    </div>
    <div class="success-sub">13 Aral&#305;k 2024&#8217;ten beri birlikteyiz &#128149;</div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:8px;">
      <button class="btn-gallery" onclick="goGallery()">&#127902;&#65039; &nbsp;Foto&#287;raflar&#305;m&#305;z</button>
      <button class="btn-poem" onclick="goPoem()">&#128214; &nbsp;Sana Bir &#350;iir</button>
    </div>
  </div>
</div>

<div class="screen" id="poemScreen">
  <div class="poem-card">
    <div class="poem-author">Naz&#305;m Hikmet</div>

<script>

var canvas = document.getElementById('starCanvas');
var ctx = canvas.getContext('2d');
var stars = [];
function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
for(var i=0;i<130;i++){
  stars.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.8+.3,s:Math.random()*.015+.003,a:Math.random()*Math.PI*2,drift:Math.random()*15-7.5});
}
function animStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(function(s){
    s.a+=s.s;
    var alpha=Math.abs(Math.sin(s.a))*.8+.1;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,220,230,'+alpha+')';ctx.fill();
    s.x+=s.drift*0.003;
    if(s.x>canvas.width+10)s.x=-10;
    if(s.x<-10)s.x=canvas.width+10;
  });
  requestAnimationFrame(animStars);
}
animStars();
function shootingStar(){
  var sx=Math.random()*canvas.width,sy=Math.random()*(canvas.height*.3);
  var len=80+Math.random()*120,angle=Math.PI/5,prog=0;
  function draw(){
    if(prog>1)return;
    var ex=sx+Math.cos(angle)*len*prog,ey=sy+Math.sin(angle)*len*prog;
    var alpha=Math.sin(prog*Math.PI);
    ctx.save();ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);
    var g=ctx.createLinearGradient(sx,sy,ex,ey);
    g.addColorStop(0,'rgba(255,200,220,0)');g.addColorStop(1,'rgba(255,200,220,'+alpha+')');
    ctx.strokeStyle=g;ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
    prog+=0.04;requestAnimationFrame(draw);
  }
  draw();
  setTimeout(shootingStar,2500+Math.random()*4000);
}
setTimeout(shootingStar,2000);

var isPlaying=false;
var ytPlayer=null;
var ytReady=false;
var tag=document.createElement('script');
tag.src='https://www.youtube.com/iframe_api';
document.head.appendChild(tag);
function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('ytPlayer',{
    height:'1',width:'1',
    videoId:'izGwDsrQ1eQ',
    playerVars:{autoplay:0,loop:1,playlist:'izGwDsrQ1eQ',controls:0,disablekb:1,fs:0,iv_load_policy:3,modestbranding:1,rel:0},
    events:{
      onReady:function(){ytReady=true;},
      onStateChange:function(e){
        if(e.data===1){isPlaying=true;document.getElementById('musicBtn').textContent='\u266A';document.getElementById('musicBtn').classList.add('playing');}
        else if(e.data===2||e.data===0){isPlaying=false;document.getElementById('musicBtn').textContent='\u266B';document.getElementById('musicBtn').classList.remove('playing');}
      }
    }
  });
}
function tryAutoPlay(){if(ytReady&&ytPlayer){ytPlayer.playVideo();}}
document.addEventListener('click',function(){if(!isPlaying)tryAutoPlay();},{once:true});
function toggleMusic(){
  if(!ytReady||!ytPlayer)return;
  var btn=document.getElementById('musicBtn');
  if(isPlaying){ytPlayer.pauseVideo();btn.textContent='\u266B';btn.classList.remove('playing');isPlaying=false;}
  else{ytPlayer.playVideo();btn.textContent='\u266A';btn.classList.add('playing');isPlaying=true;}
}

var noCount=0;
var noBtn=document.getElementById('noBtn');
noBtn.style.left=(window.innerWidth/2+80)+'px';
noBtn.style.top=(window.innerHeight/2+30)+'px';
function runAway(){
  noCount++;
  noBtn.style.left=(Math.random()*(window.innerWidth-140))+'px';
  noBtn.style.top=(Math.random()*(window.innerHeight-60))+'px';
  if(noCount>=3){document.getElementById('typewriter').innerHTML='Kacmayi birak... <span style="color:#ffb3c0;">Sevgilim olur musun?</span><span class="cursor"></span>';}
}

var sentences=['Seninle gecen her saniye daha guzel...','Yuzrun aklimdan hic gitmiyor.','Seninle olmak en buyuk mutlulugum.','Sevgilim olur musun?'];
var si=0,ci=0,deleting=false;
function type(){
  var el=document.getElementById('typewriter');if(!el)return;
  var cur=sentences[si];
  if(!deleting){
    ci++;el.innerHTML=cur.substring(0,ci)+'<span class="cursor"></span>';
    if(ci===cur.length){if(si===sentences.length-1)return;setTimeout(function(){deleting=true;type();},2200);return;}
    setTimeout(type,70);
  } else {
    ci--;el.innerHTML=cur.substring(0,ci)+'<span class="cursor"></span>';
    if(ci===0){deleting=false;si=(si+1)%sentences.length;setTimeout(type,400);return;}
    setTimeout(type,32);
  }
}
setTimeout(type,1000);

function sayYes(){
  launchConfetti();
  goScreen('successScreen');
  startCounter();
  if(ytReady&&ytPlayer){ytPlayer.playVideo();}
  document.getElementById('musicBtn').textContent='\u266A';
  document.getElementById('musicBtn').classList.add('playing');
  isPlaying=true;
}

var startDate=new Date('2024-12-13T00:00:00');
function startCounter(){
  function update(){
    var now=new Date(),diff=now-startDate;
    var days=Math.floor(diff/86400000);
    var hours=Math.floor((diff%86400000)/3600000);
    var mins=Math.floor((diff%3600000)/60000);
    document.getElementById('cDays').textContent=days;
    document.getElementById('cHours').textContent=hours;
    document.getElementById('cMins').textContent=mins;
  }
  update();setInterval(update,30000);
}

function goScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function goGallery(){goScreen('galleryScreen');setTimeout(initDrag,100);}
function goPoem(){goScreen('poemScreen');renderPoem();}
function goBack(id){goScreen(id);}

function scrollPolaroid(dir){document.getElementById('polaroidTrack').scrollBy({left:dir*240,behavior:'smooth'});}
function initDrag(){
  var s=document.getElementById('polaroidTrack'),isDown=false,startX,scrollLeft;
  s.onmousedown=function(e){isDown=true;s.classList.add('grabbing');startX=e.pageX-s.offsetLeft;scrollLeft=s.scrollLeft;};
  s.onmouseleave=function(){isDown=false;s.classList.remove('grabbing');};
  s.onmouseup=function(){isDown=false;s.classList.remove('grabbing');};
  s.onmousemove=function(e){if(!isDown)return;e.preventDefault();s.scrollLeft=scrollLeft-(e.pageX-s.offsetLeft-startX)*1.2;};
  s.addEventListener('touchstart',function(e){startX=e.touches[0].pageX;scrollLeft=s.scrollLeft;},{passive:true});
  s.addEventListener('touchmove',function(e){s.scrollLeft=scrollLeft-(e.touches[0].pageX-startX)*1.2;},{passive:true});
}

var poemLines = [
  ['Seni seviyorum',''],
  ['gozlerinin rengini seviyorum',''],
  ['ve ellerini ve aptallıklarını',''],
  ['ve yuzunden dolan gulușleri seviyorum.',''],
  ['',''],
  ['Seni seviyorum',''],
  ['ișimi sever gibi severim seni,',''],
  ['umut ve mucadele ile,',''],
  ['gozlerim acık, cesurca...',''],
  ['',''],
  ['Seni seviyorum',''],
  ['en derin ve en gizli yerinden',''],
  ['yuregimin,',''],
  ['hic kimsenin gormediginden.',''],
  ['',''],
  ['Seni seviyorum',''],
  ['tek basıma aglamak gibi,',''],
  ['sabah ișigına karșı,',''],
  ['ve hasret gibi,',''],
  ['koskoca bir hasret gibi seni seviyorum.']
];
var poemRendered=false;
function renderPoem(){
  if(poemRendered)return;
  poemRendered=true;
  var container=document.getElementById('poemBody');
  container.innerHTML='';
  var stanza=document.createElement('div');stanza.className='stanza';
  poemLines.forEach(function(line,i){
    if(line[0]===''){
      container.appendChild(stanza);
      stanza=document.createElement('div');stanza.className='stanza';
    } else {
      var span=document.createElement('span');
      span.className='poem-line';
      span.textContent=line[0];
      span.style.animationDelay=(i*0.08)+'s';
      stanza.appendChild(span);
    }
  });
  if(stanza.children.length>0)container.appendChild(stanza);
}

function launchConfetti(){
  var c=document.getElementById('confetti');
  var syms=['❤','♥','❥','❤','♥','⭐','✨'];
  var cols=['#ff4d6d','#ff6b8a','#ffb3c1','#ff85a1','#ffd6de'];
  for(var i=0;i<50;i++){
    (function(idx){setTimeout(function(){
      var el=document.createElement('div');el.className='conf-heart';
      el.textContent=syms[Math.floor(Math.random()*syms.length)];
      el.style.left=(Math.random()*100)+'vw';
      el.style.animationDuration=(1.2+Math.random()*.8)+'s';
      el.style.fontSize=(14+Math.random()*20)+'px';
      el.style.color=cols[Math.floor(Math.random()*cols.length)];
      c.appendChild(el);setTimeout(function(){el.remove();},3000);
    },idx*50);})(i);
  }
}

</script>
